<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#07080b">
    <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png">
    <script>(function(){var t="dark";try{t=localStorage.getItem("theme")||(matchMedia("(prefers-color-scheme: light)").matches?"light":"dark")}catch(e){}document.documentElement.setAttribute("data-theme",t)})()</script>
    <title>404 — Page not found | Muhammad Aliyu</title>
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%230b0d13'/%3E%3Ctext x='50' y='63' font-family='monospace' font-size='40' font-weight='bold' fill='%238fa0ff' text-anchor='middle'%3EMA%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body>
    <div class="grain" aria-hidden="true"></div>

    <header class="header">
        <div class="header__inner">
            <a href="/" class="header__brand" aria-label="Muhammad Aliyu — home">
                <span class="header__mark" aria-hidden="true">MA</span>
                <span>Muhammad Aliyu</span>
            </a>
        </div>
    </header>

    <main>
        <section class="hero" style="min-height: 100svh;">
            <canvas id="net-canvas" class="hero__canvas" aria-hidden="true"></canvas>
            <div class="hero__inner intro">
                <span class="hero__badge">
                    <span style="width:7px;height:7px;border-radius:50%;background:#f87171;display:inline-block;"
                        aria-hidden="true"></span>
                    Error 404 — node not found
                </span>
                <h1 class="hero__title">This page fell off<br>the <em class="fx">network</em></h1>
                <p class="hero__sub">The link you followed points to a node that doesn't exist — maybe it
                    moved, maybe it never was. Every good network has a path back home.</p>
                <div class="hero__actions">
                    <a href="/" class="btn btn--primary btn--lg">Back to home <span class="arr"
                            aria-hidden="true">→</span></a>
                    <a href="/research.html" class="btn btn--ghost btn--lg">View research</a>
                </div>
            </div>
        </section>
    </main>

    <script src="/assets/js/main.js"></script>
</body>

</html>
